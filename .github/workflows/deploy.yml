name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync OpenAPI spec from main app
        run: |
          curl -fsSL -o public/openapi.yaml \
            https://raw.githubusercontent.com/samuelfabel/bm-planning/main/server/internal/api/openapi/openapi.yaml

      - name: Build
        env:
          VITE_BASE_PATH: /bm-planning-site/
          VITE_GITHUB_REPO_URL: https://github.com/samuelfabel/bm-planning
        run: npx tsc -b && npx vite build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
